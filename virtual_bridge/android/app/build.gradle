plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { stream ->
        keystoreProperties.load(stream)
    }
}
def releaseSigningRequiredProperties = [
    "storeFile",
    "storePassword",
    "keyAlias",
    "keyPassword",
]
def missingReleaseSigningProperties = {
    releaseSigningRequiredProperties.findAll { key ->
        !keystoreProperties.containsKey(key) || !keystoreProperties[key]
    }
}
def releaseStoreFile = {
    keystoreProperties["storeFile"] ? rootProject.file(keystoreProperties["storeFile"]) : null
}
def validateReleaseSigning = {
    if (!keystorePropertiesFile.exists()) {
        throw new GradleException("Release signing config is missing. Create ${keystorePropertiesFile.path} with storeFile, storePassword, keyAlias, and keyPassword.")
    }

    def missingProperties = missingReleaseSigningProperties()
    if (!missingProperties.isEmpty()) {
        throw new GradleException("Release signing config is incomplete. Missing: ${missingProperties.join(', ')} in ${keystorePropertiesFile.path}.")
    }

    def storeFile = releaseStoreFile()
    if (storeFile == null || !storeFile.exists()) {
        throw new GradleException("Release signing keystore file does not exist: ${keystoreProperties["storeFile"]}")
    }
}

android {
    namespace = "com.cch.montto"
    compileSdk = flutter.compileSdkVersion
    // ndkVersion = flutter.ndkVersion
    ndkVersion = "25.1.8937393"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.cch.montto"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        // minSdk = flutter.minSdkVersion
        minSdkVersion = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            keyAlias = keystoreProperties["keyAlias"]
            keyPassword = keystoreProperties["keyPassword"]
            storeFile = releaseStoreFile()
            storePassword = keystoreProperties["storePassword"]
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
        }
    }
}

flutter {
    source = "../.."
}

tasks.matching { task ->
    task.name in ["bundleRelease", "signReleaseBundle", "validateSigningRelease"]
}.configureEach {
    doFirst {
        validateReleaseSigning()
    }
}
