def patchedFlutterEmbeddingRepo = rootProject.file(".patched-flutter-m2")

allprojects {
    repositories {
        maven {
            url = uri(patchedFlutterEmbeddingRepo)
        }
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
