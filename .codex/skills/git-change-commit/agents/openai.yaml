interface:
  display_name: "변경 요약 커밋"
  short_description: "Git 변경사항을 기본 한국어로 요약하고 커밋 메시지 작성 후 안전하게 커밋"
  default_prompt: "Use $git-change-commit to inspect this repository, summarize the current changes in Korean by default, propose a commit message that follows the repository's style, and commit safely after confirmation."
