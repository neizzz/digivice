interface:
  display_name: "변경 요약 커밋"
  short_description: "Git 변경 사항을 자연스러운 한국어 bullet로 요약하고 저장소 관례에 맞는 커밋을 안전하게 진행"
  default_prompt: "Use $git-change-commit to inspect this repository, explain the current changes in natural Korean with `-` bullets, propose a concise commit message that follows the repository's style and prefers Korean past tense when appropriate, and commit safely after confirmation."
